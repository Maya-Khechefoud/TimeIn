<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeIn - Track</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <header class="main-header">
            <div class="date-selector">
                <span class="date-header-text">Today</span>
                <i class="fa-regular fa-calendar-days"></i>
            </div>
            <div class="filter-tabs">
                <button class="tab">Week</button>
                <button class="tab">Month</button>
            </div>
        </header>

        <section class="stats-container">
            <div class="stat-card finished">
                <p>Progress percentage</p>
                <h3 class="stat-number" id="progress-percentage">0%</h3>
            </div>
            <div class="stat-card pending">
                <p>Completed tasks</p>
                <h3 class="stat-number" id="completed-count">0</h3>
            </div>
            <div class="stat-card uncompleted">
                <p>Uncompleted tasks</p>
                <h3 class="stat-number" id="uncompleted-count">0</h3>
            </div>
        </section>

        <main class="content center-content">
            <div class="battery-container">
                <div class="battery-cap"></div>
                <div class="battery-body">
                    <div class="marker m-100">100%</div>
                    <div class="marker m-50">50%</div>
                    <div class="marker m-0">0%</div>
                    
                    <div class="battery-level level-1"></div> 
                    <div class="battery-level level-2"></div> 
                    <div class="battery-level level-3"></div> 
                    <div class="battery-level level-4"></div> 
                    <div class="battery-level level-5"></div> 
                    <div class="battery-level level-6"></div> 
                    <div class="battery-level level-7"></div> 
                    <div class="battery-level level-8"></div> 
                    <div class="battery-level level-9"></div> 
                </div>
            </div>
        </main>

        <footer class="main-footer">
            <div class="pagination">
                <button class="nav-arrow"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="date-pill">00 / 00 / 0000</div>
                <button class="nav-arrow"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <nav class="bottom-nav">
                <a href="index.html" class="nav-item">
                    Schedule <i class="fa-solid fa-calendar-check"></i>
                </a>
                <div class="nav-item track active">
                    Track <i class="fa-solid fa-chart-line"></i>
                </div>
            </nav>
        </footer>
    </div>
<script src="tracker.js"></script>
</body>
</html>
